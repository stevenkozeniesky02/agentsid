<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AgentsID">
  <title>AgentsID</title>
  <defs>
    <linearGradient id="agentsidLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <!-- Background plate: AgentsID zinc-950 with 18% corner radius (Apple app-icon convention). -->
  <rect width="512" height="512" rx="96" ry="96" fill="#09090b" />
  <!-- Centered amber stacked-plates glyph (sourced from web/src/components/blocks/logo.tsx). -->
  <g transform="translate(96 96) scale(8)">
    <rect x="6" y="4" width="28" height="8" rx="3" fill="url(#agentsidLogoGrad)" opacity="0.3" />
    <rect x="4" y="14" width="32" height="8" rx="3" fill="url(#agentsidLogoGrad)" opacity="0.6" />
    <rect x="2" y="24" width="36" height="8" rx="3" fill="url(#agentsidLogoGrad)" />
    <rect x="14" y="33" width="12" height="4" rx="2" fill="url(#agentsidLogoGrad)" opacity="0.8" />
  </g>
</svg>
